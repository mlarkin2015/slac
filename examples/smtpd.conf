# Example local delivery action using SLAC as the MDA wrapper.
# Adjust /usr/local/bin/slac and /etc/slac.toml for your installation.

table aliases file:/etc/mail/aliases

listen on lo0

action "local_slac" mda "/usr/local/bin/slac -c /etc/slac.toml mda" alias <aliases>
match for local action "local_slac"

